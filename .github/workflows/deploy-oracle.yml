name: Deploy Oracle

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: apice-oracle-production
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test

  deploy:
    if: github.event_name == 'workflow_dispatch' || vars.ORACLE_DEPLOY_ENABLED == 'true'
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configurar SSH
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
          ORACLE_SSH_KEY: ${{ secrets.ORACLE_SSH_KEY }}
        run: |
          test -n "$ORACLE_HOST"
          test -n "$ORACLE_SSH_KEY"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$ORACLE_SSH_KEY" > ~/.ssh/id_oracle
          chmod 600 ~/.ssh/id_oracle
          ssh-keyscan -H "$ORACLE_HOST" >> ~/.ssh/known_hosts

      - name: Atualizar Ápice
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
        run: |
          test -n "$ORACLE_USER"
          ssh -i ~/.ssh/id_oracle "$ORACLE_USER@$ORACLE_HOST" \
            'cd /opt/apice/deploy/oracle && ./update.sh'
