services:
  - type: web
    name: career-hunter-agent
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: career-hunter-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/var/data/jobs.sqlite
      - key: STORAGE_ROOT
        value: /var/data
      - key: ALLOW_PUBLIC_REGISTRATION
        value: "false"
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_SEARCH_API_KEY
        sync: false
      - key: GOOGLE_SEARCH_ENGINE_ID
        sync: false
      - key: ACCOUNT_VAULT_KEY
        sync: false
