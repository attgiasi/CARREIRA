# Demonstração gratuita. O Render apaga SQLite e currículos quando o serviço
# gratuito dorme, reinicia ou recebe um novo deploy. Não use para dados reais.
services:
  - type: web
    name: apice-carreira-demo
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/tmp/jobs.sqlite
      - key: STORAGE_ROOT
        value: /tmp/apice-storage
      - key: ALLOW_PUBLIC_REGISTRATION
        value: "false"
      - key: GMAIL_SYNC_INTERVAL_MINUTES
        value: "30"
      - key: CAREER_HUNTER_USER_ID
        value: "1"
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GMAIL_REFRESH_TOKEN
        sync: false
